services:
  - type: web
    name: agrios-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./agrios.db
