version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: agrios-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/agrios.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
    volumes:
      - agrios-db-volume:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: agrios-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  agrios-db-volume:
